name: Sync Fork

on:
  schedule:
    # Midnight UTC every day
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Sync with upstream
        run: |
          git remote add upstream https://github.com/Muneeb-hassan96/PulsingLabs-LandingPage.git
          git fetch upstream
          git checkout main
          git merge upstream/main --no-edit
          git push origin main
